---
openapi: 3.0.1
info:
  title: API V1
  version: v1
paths:
  "/api/v1/contacts":
    get:
      summary: List contacts for the current user
      tags:
      - Contacts
      security:
      - bearerAuth: []
      parameters:
      - name: Authorization
        in: header
        required: true
        description: Bearer JWT token
        schema:
          type: string
      - name: page
        in: query
        required: false
        description: Page number
        schema:
          type: integer
      - name: name
        in: query
        required: false
        description: Filter by name
        schema:
          type: string
      - name: cpf
        in: query
        required: false
        description: Filter by CPF
        schema:
          type: string
      - name: cnpj
        in: query
        required: false
        description: Filter by CNPJ
        schema:
          type: string
      responses:
        '401':
          description: returns unauthorized when token is invalid
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    nullable: true
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        example: UNAUTHORIZED
                      message:
                        type: string
                      details:
                        type: array
                        items:
                          type: string
        '200':
          description: returns empty when filter has no match
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      type: object
                  meta:
                    type: object
                    properties:
                      current_page:
                        type: integer
                      total_pages:
                        type: integer
                      total_count:
                        type: integer
                  message:
                    type: string
                    nullable: true
    post:
      summary: Create a contact for the current user
      tags:
      - Contacts
      security:
      - bearerAuth: []
      parameters:
      - name: Authorization
        in: header
        required: true
        description: Bearer JWT token
        schema:
          type: string
      responses:
        '201':
          description: creates a contact with name, phone, cnpj
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                  message:
                    type: string
        '422':
          description: returns validation error(s) for invalid or missing contact
            fields (e.g. cpf/cnpj, phone, email)
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    nullable: true
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                      message:
                        type: string
                      details:
                        type: array
                        items:
                          type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                contact:
                  type: object
                  properties:
                    name:
                      type: string
                    email:
                      type: string
                    phone:
                      type: string
                    cpf:
                      type: string
                    cnpj:
                      type: string
                  required:
                  - name
  "/api/v1/contacts/{id}":
    parameters:
    - name: id
      in: path
      required: true
      description: Contact UUID
      schema:
        type: string
    get:
      summary: Show a contact
      tags:
      - Contacts
      security:
      - bearerAuth: []
      parameters:
      - name: Authorization
        in: header
        required: true
        description: Bearer JWT token
        schema:
          type: string
      responses:
        '200':
          description: returns a contact
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                  message:
                    type: string
                    nullable: true
        '404':
          description: returns error when contact is not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    nullable: true
                  error:
                    type: object
    patch:
      summary: Update a contact
      tags:
      - Contacts
      security:
      - bearerAuth: []
      parameters:
      - name: Authorization
        in: header
        required: true
        description: Bearer JWT token
        schema:
          type: string
      responses:
        '200':
          description: updates a contact successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                  message:
                    type: string
        '422':
          description: returns error when update removes phone or email leaving both
            empty
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    nullable: true
                  error:
                    type: object
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                contact:
                  type: object
                  properties:
                    name:
                      type: string
                    email:
                      type: string
                    phone:
                      type: string
                    cpf:
                      type: string
                    cnpj:
                      type: string
    delete:
      summary: Delete a contact
      tags:
      - Contacts
      security:
      - bearerAuth: []
      parameters:
      - name: Authorization
        in: header
        required: true
        description: Bearer JWT token
        schema:
          type: string
      responses:
        '200':
          description: returns success when deleting a not found contact
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    nullable: true
                  message:
                    type: string
  "/auth/callback":
    post:
      summary: Authenticate with Gov.br OAuth code
      tags:
      - Authentication
      parameters: []
      responses:
        '201':
          description: successful login — prata or ouro user
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                      type:
                        type: string
                      attributes:
                        type: object
                        properties:
                          name:
                            type: string
                          email:
                            type: string
                          cpf:
                            type: string
                          trust_level:
                            type: string
                  token:
                    type: string
                    description: JWT Bearer token for subsequent authenticated requests
                  message:
                    type: string
        '403':
          description: insufficient trust level (bronze user)
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: insufficient_trust_level
        '503':
          description: Gov.br unavailable
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: gateway_error
        '401':
          description: invalid or malformed token returned by Gov.br
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: invalid_token
        '422':
          description: missing code parameter
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: missing_code
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                code:
                  type: string
                  description: Authorization code from Gov.br
              required:
              - code
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
servers:
- url: https://{defaultHost}
  variables:
    defaultHost:
      default: www.example.com
